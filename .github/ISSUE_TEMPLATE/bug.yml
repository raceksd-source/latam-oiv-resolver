name: Bug report
description: Report a defect in the resolver code, normalizers, or build.
title: "[bug] <short description>"
labels: ["bug", "needs-triage"]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0-alpha.1
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.x
    validations:
      required: true
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal code or commands to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell
    validations:
      required: false
