name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check dist output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)
          echo "Build artifacts verified"

  schema-validate:
    name: Validate country datasets against schema
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate placeholder dataset structure
        run: |
          for f in data/countries/*/_placeholder.json; do
            node -e "JSON.parse(require('node:fs').readFileSync('$f', 'utf8'))" || exit 1
          done
          node -e "JSON.parse(require('node:fs').readFileSync('data/_meta.json', 'utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('data/schema.json', 'utf8'))"
          echo "All JSON datasets are syntactically valid"
